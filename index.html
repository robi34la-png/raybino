<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bello AI – Ray-Ban Meta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --bg:#0a0a0a; --surface:#111111; --border:#1e1e1e; --accent:#00ff88; --accent2:#ff3366; --accent3:#ffaa00; --text:#f0f0f0; --muted:#555; --glow:0 0 20px rgba(0,255,136,0.3); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; overflow-x:hidden; }
  .grid-bg { position:fixed; inset:0; background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .container { position:relative; z-index:1; width:100%; max-width:420px; display:flex; flex-direction:column; gap:16px; align-items:center; padding-bottom:40px; }
  .header { text-align:center; width:100%; padding-top:10px; }
  .logo { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:4px; text-transform:uppercase; margin-bottom:6px; }
  .title { font-size:48px; font-weight:800; letter-spacing:-2px; line-height:1; background:linear-gradient(135deg,#fff 0%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:6px; letter-spacing:2px; }
  .status-card { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 18px; display:flex; align-items:center; gap:12px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:all 0.3s; }
  .status-dot.connected { background:var(--accent); box-shadow:var(--glow); animation:pulse 2s infinite; }
  .status-dot.listening { background:var(--accent2); box-shadow:0 0 20px rgba(255,51,102,0.4); animation:pulse 0.5s infinite; }
  .status-dot.thinking { background:var(--accent3); box-shadow:0 0 20px rgba(255,170,0,0.4); animation:pulse 1s infinite; }
  .status-dot.speaking { background:#00aaff; box-shadow:0 0 20px rgba(0,170,255,0.4); animation:pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.7} }
  .status-info { flex:1; }
  .status-text { font-family:'Space Mono',monospace; font-size:11px; color:var(--text); letter-spacing:1px; }
  .status-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:1px; }
  .mode-tabs { width:100%; display:flex; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:6px; }
  .mode-tab { flex:1; padding:8px 4px; border:none; background:transparent; color:var(--muted); font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px; cursor:pointer; border-radius:8px; transition:all 0.3s; text-transform:uppercase; }
  .mode-tab.active { background:rgba(0,255,136,0.1); color:var(--accent); border:1px solid rgba(0,255,136,0.3); }
  .main-btn { width:150px; height:150px; border-radius:50%; border:2px solid var(--accent); background:transparent; cursor:pointer; position:relative; transition:all 0.3s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; }
  .main-btn::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(0,255,136,0.2); animation:rotate 8s linear infinite; }
  .main-btn::after { content:''; position:absolute; inset:-20px; border-radius:50%; border:1px dashed rgba(0,255,136,0.1); animation:rotate 15s linear infinite reverse; }
  @keyframes rotate { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
  .main-btn:hover { background:rgba(0,255,136,0.05); box-shadow:var(--glow); }
  .main-btn.listening { border-color:var(--accent2); background:rgba(255,51,102,0.05); box-shadow:0 0 30px rgba(255,51,102,0.3); animation:breathe 1s ease-in-out infinite; }
  .main-btn.thinking { border-color:var(--accent3); background:rgba(255,170,0,0.05); box-shadow:0 0 30px rgba(255,170,0,0.3); }
  .main-btn.speaking { border-color:#00aaff; background:rgba(0,170,255,0.05); box-shadow:0 0 30px rgba(0,170,255,0.3); }
  @keyframes breathe { 0%,100%{transform:scale(1)}50%{transform:scale(1.05)} }
  .btn-icon { font-size:30px; transition:all 0.3s; }
  .btn-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .main-btn.listening .btn-label { color:var(--accent2); }
  .main-btn.thinking .btn-label { color:var(--accent3); }
  .main-btn.speaking .btn-label { color:#00aaff; }
  .stop-btn { padding:10px 24px; border:1px solid var(--accent2); border-radius:20px; background:rgba(255,51,102,0.1); color:var(--accent2); font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; cursor:pointer; transition:all 0.3s; display:none; }
  .stop-btn.visible { display:block; }
  .stop-btn:hover { background:rgba(255,51,102,0.2); }
  .waveform { display:flex; align-items:center; justify-content:center; gap:3px; height:28px; opacity:0; transition:opacity 0.3s; }
  .waveform.active { opacity:1; }
  .wave-bar { width:3px; border-radius:2px; background:var(--accent2); animation:wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:0.1s}.wave-bar:nth-child(3){animation-delay:0.2s}.wave-bar:nth-child(4){animation-delay:0.3s}.wave-bar:nth-child(5){animation-delay:0.2s}.wave-bar:nth-child(6){animation-delay:0.1s}.wave-bar:nth-child(7){animation-delay:0s}
  @keyframes wave { 0%,100%{height:4px}50%{height:22px} }
  .wake-word-hint { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-align:center; letter-spacing:1px; }
  .wake-word-hint span { color:var(--accent); font-weight:700; }
  .camera-section { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; display:none; }
  .camera-section.visible { display:block; }
  .camera-preview { width:100%; height:200px; object-fit:cover; background:#000; display:block; }
  .camera-controls { padding:12px; display:flex; gap:8px; }
  .cam-btn { flex:1; padding:10px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--text); font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; transition:all 0.3s; letter-spacing:1px; }
  .cam-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cam-btn.primary { border-color:var(--accent); color:var(--accent); background:rgba(0,255,136,0.05); }
  .card { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px 18px; display:flex; flex-direction:column; gap:8px; transition:all 0.3s; }
  .card.active { border-color:rgba(0,255,136,0.3); box-shadow:0 0 20px rgba(0,255,136,0.05); }
  .card-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
  .card-text { font-size:13px; color:var(--text); line-height:1.6; min-height:30px; }
  .transcript-text { font-family:'Space Mono',monospace; font-size:12px; color:var(--accent); min-height:18px; }
  .history-section { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  .history-header { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .history-title { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
  .clear-btn { font-family:'Space Mono',monospace; font-size:9px; color:var(--accent2); background:none; border:none; cursor:pointer; letter-spacing:1px; }
  .history-list { max-height:200px; overflow-y:auto; }
  .history-item { padding:10px 18px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
  .history-item:last-child { border-bottom:none; }
  .history-q { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); }
  .history-a { font-size:12px; color:var(--muted); line-height:1.4; }
  .features-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .feature-btn { padding:14px 10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; transition:all 0.3s; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
  .feature-btn:hover { border-color:var(--accent); background:rgba(0,255,136,0.03); }
  .feat-icon { font-size:22px; }
  .feat-label { font-size:11px; font-weight:700; }
  .feat-sub { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:1px; }
  .error-text { color:var(--accent2); font-family:'Space Mono',monospace; font-size:10px; text-align:center; padding:10px; background:rgba(255,51,102,0.05); border:1px solid rgba(255,51,102,0.2); border-radius:8px; width:100%; display:none; }
  .bottom-info { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); text-align:center; letter-spacing:1px; opacity:0.4; }
  canvas { display:none; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<canvas id="canvas"></canvas>
<div class="container">
  <div class="header">
    <div class="logo">Ray-Ban Meta × Claude</div>
    <div class="title">BELLO</div>
    <div class="subtitle">// DEIN KI ASSISTENT</div>
  </div>
  <div class="status-card">
    <div class="status-dot connected" id="statusDot"></div>
    <div class="status-info">
      <div class="status-text" id="statusText">BEREIT</div>
      <div class="status-sub" id="statusSub">Sag "Hey Bello" oder tippe den Button</div>
    </div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('voice')" id="tab-voice">🎙️ SPRACHE</button>
    <button class="mode-tab" onclick="setMode('camera')" id="tab-camera">📷 KAMERA</button>
    <button class="mode-tab" onclick="setMode('translate')" id="tab-translate">🌍 ÜBERSETZEN</button>
  </div>
  <button class="main-btn" id="mainBtn" onclick="toggleListening()">
    <div class="btn-icon" id="btnIcon">🎙️</div>
    <div class="btn-label" id="btnLabel">TIPPEN</div>
  </button>
  <button class="stop-btn" id="stopBtn" onclick="stopAll()">⏹ STOP</button>
  <div class="waveform" id="waveform">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
  <div class="wake-word-hint" id="wakeHint">Sag <span>"HEY BELLO"</span> oder tippe den Button</div>
  <div class="camera-section" id="cameraSection">
    <video class="camera-preview" id="videoEl" autoplay playsinline muted></video>
    <div class="camera-controls">
      <button class="cam-btn primary" onclick="analyzePhoto()">📸 FOTO ANALYSIEREN</button>
      <button class="cam-btn" onclick="stopCamera()">✕ SCHLIESSEN</button>
    </div>
  </div>
  <div class="card" id="transcriptCard">
    <div class="card-label">// Du sagtest</div>
    <div class="transcript-text" id="transcriptText">—</div>
  </div>
  <div class="card" id="responseCard">
    <div class="card-label">// Bello antwortet</div>
    <div class="card-text" id="responseText">Bereit für deine Fragen...</div>
  </div>
  <div class="features-grid">
    <button class="feature-btn" onclick="quickAsk('Beschreibe kurz was ich gerade tun könnte um produktiver zu sein.')">
      <div class="feat-icon">💡</div>
      <div class="feat-label">TIPP</div>
      <div class="feat-sub">// PRODUKTIVITÄT</div>
    </button>
    <button class="feature-btn" onclick="quickAsk('Gib mir einen kurzen motivierenden Spruch auf Deutsch.')">
      <div class="feat-icon">💪</div>
      <div class="feat-label">MOTIVATION</div>
      <div class="feat-sub">// BOOST</div>
    </button>
    <button class="feature-btn" onclick="quickAsk('Erkläre mir kurz wie ich heute einen guten ersten Eindruck mache.')">
      <div class="feat-icon">🤝</div>
      <div class="feat-label">EINDRUCK</div>
      <div class="feat-sub">// COACH</div>
    </button>
    <button class="feature-btn" onclick="startTranslateMode()">
      <div class="feat-icon">🌍</div>
      <div class="feat-label">ÜBERSETZEN</div>
      <div class="feat-sub">// LIVE</div>
    </button>
  </div>
  <div class="history-section">
    <div class="history-header">
      <div class="history-title">// VERLAUF</div>
      <button class="clear-btn" onclick="clearHistory()">LÖSCHEN</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item"><div class="history-q">— Noch keine Anfragen —</div></div>
    </div>
  </div>
  <div class="error-text" id="errorText"></div>
  <div class="bottom-info">BELLO v2.0 × POWERED BY CLAUDE AI × RAY-BAN META</div>
</div>
<script>
  let recognition=null,isListening=false,isThinking=false,isSpeaking=false;
  let synth=window.speechSynthesis,currentMode='voice',history=[],videoStream=null;
  let isTranslateMode=false,continuousListening=false;
  const statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText');
  const statusSub=document.getElementById('statusSub'),mainBtn=document.getElementById('mainBtn');
  const btnIcon=document.getElementById('btnIcon'),btnLabel=document.getElementById('btnLabel');
  const stopBtn=document.getElementById('stopBtn'),transcriptText=document.getElementById('transcriptText');
  const responseText=document.getElementById('responseText'),responseCard=document.getElementById('responseCard');
  const errorText=document.getElementById('errorText'),waveform=document.getElementById('waveform');
  const historyList=document.getElementById('historyList');

  function setStatus(state,text,sub){statusDot.className='status-dot '+state;statusText.textContent=text;statusSub.textContent=sub;}
  function showError(msg){errorText.style.display='block';errorText.textContent='⚠️ '+msg;setTimeout(()=>errorText.style.display='none',5000);}

  function setMode(mode){
    currentMode=mode;
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+mode).classList.add('active');
    if(mode==='camera')startCamera(); else stopCamera();
    if(mode==='translate'){isTranslateMode=true;document.getElementById('wakeHint').innerHTML='Sprich – ich übersetze auf <span>ENGLISCH</span>';}
    else{isTranslateMode=false;document.getElementById('wakeHint').innerHTML='Sag <span>"HEY BELLO"</span> oder tippe den Button';}
  }

  function initRecognition(){
    if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){showError('Spracherkennung nicht unterstützt.');return false;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=true;
    recognition.onstart=()=>{isListening=true;setStatus('listening','HÖRT ZU...','Sprich jetzt!');mainBtn.className='main-btn listening';btnIcon.textContent='🔴';btnLabel.textContent='LÄUFT';stopBtn.className='stop-btn visible';waveform.className='waveform active';};
    recognition.onresult=(event)=>{
      let interim='',final='';
      for(let i=event.resultIndex;i<event.results.length;i++){if(event.results[i].isFinal)final+=event.results[i][0].transcript;else interim+=event.results[i][0].transcript;}
      const display=final||interim;transcriptText.textContent=display;
      const lower=display.toLowerCase();
      if(lower.includes('hey bello')){const q=display.replace(/hey bello/gi,'').trim();if(q.length>2)askClaude(q);return;}
      if(isTranslateMode&&final&&final.length>3){askClaude('Übersetze auf Englisch, nur die Übersetzung: '+final);return;}
      if(final&&final.length>5&&continuousListening&&!isThinking)askClaude(final);
    };
    recognition.onerror=(e)=>{if(e.error==='not-allowed')showError('Mikrofon Zugriff verweigert!');};
    recognition.onend=()=>{if(continuousListening&&!isThinking){setTimeout(()=>{try{recognition.start();}catch(e){}},300);}else resetUI();};
    return true;
  }

  function resetUI(){isListening=false;setStatus('connected','BEREIT','Sag "Hey Bello" oder tippe den Button');mainBtn.className='main-btn';btnIcon.textContent='🎙️';btnLabel.textContent='TIPPEN';stopBtn.className='stop-btn';waveform.className='waveform';}

  function toggleListening(){
    if(isThinking)return;
    if(!recognition){if(!initRecognition())return;}
    if(isListening){continuousListening=false;recognition.stop();}
    else{continuousListening=true;try{recognition.start();}catch(e){recognition=null;initRecognition();setTimeout(()=>{try{recognition.start();}catch(e2){}},200);}}
  }

  function stopAll(){continuousListening=false;isThinking=false;isSpeaking=false;synth.cancel();if(recognition){try{recognition.stop();}catch(e){}}resetUI();responseText.textContent='Gestoppt.';}

  function quickAsk(question){transcriptText.textContent=question;askClaude(question);}
  function startTranslateMode(){setMode('translate');toggleListening();}

  async function analyzePhoto(){
    const video=document.getElementById('videoEl'),canvas=document.getElementById('canvas');
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const imageData=canvas.toDataURL('image/jpeg',0.8).split(',')[1];
    await askClaude('Analysiere dieses Foto detailliert. Was siehst du?',imageData);
  }

  async function askClaude(question,imageData=null){
    if(isThinking)return;isThinking=true;synth.cancel();
    setStatus('thinking','DENKT NACH...','Claude analysiert...');
    mainBtn.className='main-btn thinking';btnIcon.textContent='🧠';btnLabel.textContent='DENKT';waveform.className='waveform';
    transcriptText.textContent=question.length>60?question.substring(0,60)+'...':question;
    responseText.textContent='...';responseCard.className='card active';
    try{
      const body={message:question};if(imageData)body.image=imageData;
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok)throw new Error('Server Fehler: '+res.status);
      const data=await res.json();const answer=data.response||'Keine Antwort.';
      responseText.textContent=answer;addToHistory(question,answer);speakAnswer(answer);
    }catch(err){showError(err.message);responseText.textContent='Verbindungsfehler.';}
    finally{isThinking=false;if(!isListening)resetUI();}
  }

  function speakAnswer(text){
    synth.cancel();const utter=new SpeechSynthesisUtterance(text);
    utter.lang='de-DE';utter.rate=1.1;utter.pitch=1.0;utter.volume=1.0;
    const voices=synth.getVoices();
    const gv=voices.find(v=>v.lang.startsWith('de')&&v.localService)||voices.find(v=>v.lang.startsWith('de'));
    if(gv)utter.voice=gv;
    utter.onstart=()=>{isSpeaking=true;setStatus('speaking','SPRICHT...','Bello antwortet');mainBtn.className='main-btn speaking';btnIcon.textContent='🔊';btnLabel.textContent='SPRICHT';};
    utter.onend=()=>{isSpeaking=false;if(!isListening)resetUI();};
    synth.speak(utter);
  }

  function addToHistory(q,a){history.unshift({q,a});if(history.length>10)history.pop();renderHistory();}
  function renderHistory(){
    if(history.length===0){historyList.innerHTML='<div class="history-item"><div class="history-q">— Noch keine Anfragen —</div></div>';return;}
    historyList.innerHTML=history.map(item=>`<div class="history-item"><div class="history-q">▸ ${item.q.length>50?item.q.substring(0,50)+'...':item.q}</div><div class="history-a">${item.a.length>80?item.a.substring(0,80)+'...':item.a}</div></div>`).join('');
  }
  function clearHistory(){history=[];renderHistory();}

  async function startCamera(){
    const section=document.getElementById('cameraSection');section.className='camera-section visible';
    try{videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});document.getElementById('videoEl').srcObject=videoStream;}
    catch(e){showError('Kamera Zugriff verweigert!');section.className='camera-section';}
  }

  function stopCamera(){if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}document.getElementById('cameraSection').className='camera-section';}

  window.onload=()=>{if(initRecognition())setStatus('connected','BEREIT','Sag "Hey Bello" oder tippe den Button');synth.onvoiceschanged=()=>synth.getVoices();};
</script>
</body>
</html>
